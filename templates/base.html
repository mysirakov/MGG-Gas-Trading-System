<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGG Gas Trading System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar-active { background-color: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 hidden md:block">
            <div class="p-6">
                <div class="flex items-center gap-2 mb-8">
                    <span class="material-icons text-blue-600 text-3xl">local_gas_station</span>
                    <h1 class="text-xl font-bold text-gray-800">MGG Gas</h1>
                </div>
                <nav class="space-y-1">
                    <a href="/" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 {% if active_page == 'dashboard' %}sidebar-active{% endif %}">
                        <span class="material-icons text-gray-500">dashboard</span>
                        <span>Dashboard</span>
                    </a>
                    <a href="/purchases" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 {% if active_page == 'purchases' %}sidebar-active{% endif %}">
                        <span class="material-icons text-gray-500">shopping_cart</span>
                        <span>Purchases</span>
                    </a>
                    <a href="/sales" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 {% if active_page == 'sales' %}sidebar-active{% endif %}">
                        <span class="material-icons text-gray-500">trending_up</span>
                        <span>Sales</span>
                    </a>
                    <a href="/payments" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 {% if active_page == 'payments' %}sidebar-active{% endif %}">
                        <span class="material-icons text-gray-500">payments</span>
                        <span>Payments</span>
                    </a>
                    <a href="/balance" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 {% if active_page == 'balance' %}sidebar-active{% endif %}">
                        <span class="material-icons text-gray-500">account_balance</span>
                        <span>Seller Balance</span>
                    </a>
                    <a href="/analytics" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 {% if active_page == 'analytics' %}sidebar-active{% endif %}">
                        <span class="material-icons text-gray-500">analytics</span>
                        <span>Analytics</span>
                    </a>
                    <a href="/settings" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 {% if active_page == 'settings' %}sidebar-active{% endif %}">
                        <span class="material-icons text-gray-500">settings</span>
                        <span>Settings</span>
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center md:hidden">
                <div class="flex items-center gap-2">
                    <span class="material-icons text-blue-600">local_gas_station</span>
                    <h1 class="text-lg font-bold">MGG Gas</h1>
                </div>
                <button class="p-2 text-gray-500 hover:bg-gray-100 rounded-lg">
                    <span class="material-icons">menu</span>
                </button>
            </header>

            <div class="flex-1 overflow-y-auto p-4 md:p-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Modals and dynamic content -->
    {% block scripts %}{% endblock %}
</body>
</html>
